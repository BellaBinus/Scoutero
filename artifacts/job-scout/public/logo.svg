<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="white-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feFlood flood-color="white" flood-opacity="1" result="white1"/>
      <feComposite in="white1" in2="blur1" operator="in" result="glow1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feFlood flood-color="white" flood-opacity="0.9" result="white2"/>
      <feComposite in="white2" in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="glow2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Perfect circle: rx = ry = 40 (half of 80) -->
  <rect width="80" height="80" rx="40" ry="40" fill="#4d7435"/>
  <text x="40" y="58" text-anchor="middle" font-size="46"
    font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif"
    filter="url(#white-glow)">🐒</text>
</svg>
